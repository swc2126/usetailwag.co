<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/tailwag-icon.svg" type="image/svg+xml" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YFRN3VT005"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YFRN3VT005');

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TailWag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0F1410;
      --green: #1E6B4A;
      --green-dark: #164D35;
      --linen: #F5F0E8;
      --gold: #C4933F;
      --sage: #A8C5B0;
      --slate: #2D3748;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --green-15: rgba(30, 107, 74, 0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--linen);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ─────────────────────────────────────────────── */
    .nav {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo span {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--linen);
    }

    .nav-link {
      font-size: 14px;
      color: var(--sage);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--linen); }

    /* ── MAIN ────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 32px;
      color: var(--linen);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 15px;
      color: rgba(245, 240, 232, 0.6);
      line-height: 1.5;
    }

    /* ── FORM CARD ────────────────────────────────────────── */
    .login-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 36px 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sage);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      color: var(--linen);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .form-group input::placeholder {
      color: rgba(245, 240, 232, 0.3);
    }

    .form-group input:focus {
      border-color: var(--green);
      background: rgba(30, 107, 74, 0.08);
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .remember-me span {
      font-size: 13px;
      color: rgba(245, 240, 232, 0.6);
    }

    .forgot-link {
      font-size: 13px;
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: var(--sage); }

    /* ── BUTTON ───────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-login:hover {
      background: var(--green-dark);
    }

    .btn-login:active {
      transform: scale(0.99);
    }

    /* ── ERROR STATE ──────────────────────────────────────── */
    .error-msg {
      background: rgba(196, 74, 63, 0.12);
      border: 1px solid rgba(196, 74, 63, 0.3);
      color: #E87C73;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      line-height: 1.5;
    }

    .error-msg.visible { display: block; }

    /* ── SIGNUP PROMPT ─────────────────────────────────────── */
    .signup-prompt {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: rgba(245, 240, 232, 0.5);
    }

    .signup-prompt a {
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .signup-prompt a:hover { color: var(--sage); }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border-subtle);
    }

    .footer p {
      font-size: 12px;
      color: rgba(245, 240, 232, 0.3);
    }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .nav { padding: 16px 20px; }
      .login-card { padding: 28px 20px; }
      .login-header h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- ═══ NAV ═══ -->
  <nav class="nav">
    <a href="https://usetailwag.co" class="nav-logo">
      <img src="/images/tailwag-icon.svg" alt="TailWag" style="height:32px;width:auto;" />
      <span>TailWag</span>
    </a>
    <a href="https://usetailwag.co" class="nav-link">← Back to site</a>
  </nav>

  <!-- ═══ LOGIN FORM ═══ -->
  <main class="main">
    <div class="login-container">
      <div class="login-header">
        <h1>Welcome back</h1>
        <p>Sign in to your daycare dashboard</p>
      </div>

      <div class="login-card">
        <div class="error-msg" id="errorMsg">
          Invalid email or password. Please try again.
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@yourdaycare.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember">
              <span>Remember me</span>
            </label>
            <a href="/forgot-password.html" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-login">Sign in</button>
        </form>
      </div>

      <div class="signup-prompt">
        New to TailWag? <a href="signup.html">Create your account</a>
      </div>
    </div>
  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <p>&copy; 2026 TailWag. Built for dog people by dog people.</p>
  </footer>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = e.target.querySelector('.btn-login');

      errorMsg.classList.remove('visible');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Invalid email or password.');
        }

        // Store session in localStorage
        localStorage.setItem('tailwag_session', JSON.stringify(data.session));
        localStorage.setItem('tailwag_user', JSON.stringify(data.user));

        // Redirect to dashboard
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('visible');
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    }
  </script>
  <script>
    window.intercomSettings = { api_base: "https://api-iam.intercom.io", app_id: "ov6sdlds" };
    (function(){var w=document,ic=w.createElement('script');ic.type='text/javascript';ic.async=true;ic.src='https://widget.intercom.io/widget/ov6sdlds';var s=w.getElementsByTagName('script')[0];s.parentNode.insertBefore(ic,s);})();
  </script>
</body>
</html>
