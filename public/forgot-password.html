<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/images/tailwag-icon.svg" type="image/svg+xml" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YFRN3VT005"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YFRN3VT005');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TailWag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0F1410;
      --green: #1E6B4A;
      --green-dark: #164D35;
      --linen: #F5F0E8;
      --sage: #A8C5B0;
      --slate: #2D3748;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--linen);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--linen);
    }
    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: rgba(245,240,232,0.55);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: rgba(245,240,232,0.75);
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--linen);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .form-group input::placeholder { color: rgba(245,240,232,0.3); }
    .form-group input:focus { outline: none; border-color: var(--green); background: rgba(30,107,74,0.08); }
    .btn {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--green-dark); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: rgba(220,53,69,0.15);
      border: 1px solid rgba(220,53,69,0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #ff8a8a;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .success-msg {
      background: rgba(30,107,74,0.15);
      border: 1px solid rgba(30,107,74,0.35);
      border-radius: 8px;
      padding: 20px;
      font-size: 14px;
      color: var(--sage);
      text-align: center;
      line-height: 1.6;
      display: none;
    }
    .success-msg.visible { display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: rgba(245,240,232,0.45);
      text-decoration: none;
    }
    .back-link:hover { color: var(--sage); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-text">🐾 TailWag</span>
    </div>

    <h1>Forgot your password?</h1>
    <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="success-msg" id="successMsg">
      ✅ Check your inbox!<br><br>
      We sent a password reset link to <strong id="sentEmail"></strong>.<br>
      It expires in 1 hour. Check your spam folder if you don't see it.
    </div>

    <form id="forgotForm" onsubmit="handleForgot(event)">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@yourdaycare.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn" id="submitBtn">Send reset link</button>
    </form>

    <a href="/login.html" class="back-link">← Back to sign in</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      'https://bixfhpzcqxjtdprjmuhx.supabase.co',
      'sb_publishable_uV2f84qQ9r8D_Vdmb3-6JQ_o5ZYSyD9'
    );

    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const redirectTo = `${window.location.origin}/reset-password.html`;

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });

      if (error) {
        const raw = error.message || error.status || JSON.stringify(error);
        const msg = raw && raw !== '{}'
          ? raw
          : 'Something went wrong. Please try again in a moment.';
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Send reset link';
        return;
      }

      // Show success regardless (don't reveal if email exists)
      document.getElementById('forgotForm').style.display = 'none';
      document.getElementById('sentEmail').textContent = email;
      successMsg.classList.add('visible');
    }
  </script>
</body>
</html>
