<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join TailWag — Set Up Your Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0F1410; --green: #1E6B4A; --green-dark: #164D35;
      --linen: #F5F0E8; --gold: #C4933F; --sage: #A8C5B0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff; border-radius: 20px;
      width: 100%; max-width: 440px;
      padding: 40px; box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 28px;
    }
    .logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800;
      font-size: 20px; color: var(--black);
    }

    /* INVITE HEADER */
    .invite-header {
      background: var(--linen); border-radius: 12px;
      padding: 18px 20px; margin-bottom: 28px;
    }
    .invite-daycare {
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800;
      font-size: 18px; color: var(--black); margin-bottom: 4px;
    }
    .invite-meta { font-size: 13px; color: #888; }
    .invite-role {
      display: inline-block; margin-top: 8px;
      background: rgba(30,107,74,0.1); color: var(--green);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 3px 10px; border-radius: 20px;
    }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800;
      font-size: 22px; color: var(--black); margin-bottom: 6px;
    }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.5; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #999; margin-bottom: 7px;
    }
    .form-control {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 15px; color: var(--black);
      background: #fff; outline: none; transition: border-color 0.2s;
    }
    .form-control:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(30,107,74,0.08); }
    .form-control:disabled { background: #f8f9fa; color: #aaa; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Password strength */
    .pw-strength { height: 4px; border-radius: 2px; margin-top: 8px; background: #eee; overflow: hidden; }
    .pw-strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }
    .pw-hint { font-size: 11px; color: #bbb; margin-top: 5px; }

    .btn-submit {
      width: 100%; padding: 13px; background: var(--green); color: var(--linen);
      border: none; border-radius: 8px; font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-submit:hover { background: var(--green-dark); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg { font-size: 13px; margin-top: 14px; padding: 10px 14px; border-radius: 8px; display: none; }
    .msg.error { background: rgba(229,62,62,0.08); color: #c53030; }
    .msg.success { background: rgba(30,107,74,0.08); color: var(--green); }

    .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .login-link a { color: var(--green); font-weight: 600; text-decoration: none; }

    /* Loading / error states */
    .state-loading, .state-error {
      text-align: center; padding: 20px 0;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(30,107,74,0.15);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<div class="card" id="mainCard">
  <!-- Logo -->
  <a href="/" class="logo">
    <svg width="26" height="26" viewBox="0 0 56 56" fill="none">
      <rect width="56" height="56" fill="#1E6B4A" rx="9"/>
      <path d="M11 50 C5 30,23 4,41 4 C49 4,51 18,45 26" stroke="#F5F0E8" stroke-width="6" stroke-linecap="round" fill="none"/>
      <circle cx="45" cy="26" r="3.5" fill="#F5F0E8"/>
    </svg>
    <span class="logo-text">TailWag</span>
  </a>

  <!-- Loading state -->
  <div id="stateLoading" class="state-loading">
    <div class="spinner"></div>
    <p style="color:#999;font-size:14px;">Validating your invite...</p>
  </div>

  <!-- Error state -->
  <div id="stateError" class="state-error" style="display:none;">
    <div style="font-size:40px;margin-bottom:12px;">😕</div>
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:#0F1410;margin-bottom:8px;" id="errorTitle">Invalid invite</div>
    <p style="font-size:14px;color:#888;line-height:1.6;margin-bottom:20px;" id="errorBody">This invite link is not valid or has already been used.</p>
    <a href="/login.html" style="font-size:14px;font-weight:600;color:#1E6B4A;text-decoration:none;">Go to login →</a>
  </div>

  <!-- Registration form (shown after valid invite loads) -->
  <div id="stateForm" style="display:none;">
    <!-- Daycare context -->
    <div class="invite-header">
      <div class="invite-daycare" id="daycareName">—</div>
      <div class="invite-meta" id="daycareLocation">—</div>
      <span class="invite-role" id="inviteRole">Team Member</span>
    </div>

    <h1>Set up your account</h1>
    <p class="subtitle">Your email is set. Just add your name and create a password to get started.</p>

    <form id="joinForm" onsubmit="handleJoin(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="form-control" type="text" id="firstName" placeholder="Jane" required autocomplete="given-name">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="form-control" type="text" id="lastName" placeholder="Smith" autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" id="emailDisplay" disabled>
      </div>

      <div class="form-group">
        <label class="form-label">Create Password</label>
        <input class="form-control" type="password" id="password" placeholder="At least 8 characters"
          required autocomplete="new-password" oninput="updatePwStrength(this.value)">
        <div class="pw-strength"><div class="pw-strength-fill" id="pwFill"></div></div>
        <div class="pw-hint" id="pwHint">Use 8+ characters</div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Create Account & Sign In</button>
      <div class="msg" id="formMsg"></div>
    </form>

    <div class="login-link">Already have an account? <a href="/login.html">Sign in</a></div>
  </div>
</div>

<script>
  let inviteToken = null;
  let inviteEmail = null;

  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  function updatePwStrength(val) {
    const fill = document.getElementById('pwFill');
    const hint = document.getElementById('pwHint');
    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pct = Math.min(100, score * 20);
    const color = pct < 40 ? '#e53e3e' : pct < 70 ? '#d97706' : '#1E6B4A';
    fill.style.width = pct + '%';
    fill.style.background = color;
    hint.textContent = pct < 40 ? 'Too short — use 8+ characters' : pct < 70 ? 'Fair — add numbers or symbols' : 'Strong password ✓';
    hint.style.color = color;
  }

  async function loadInvite() {
    inviteToken = getToken();
    if (!inviteToken) {
      showError('No invite token', 'This link is missing an invite token. Please use the link from your invitation email.');
      return;
    }
    try {
      const res = await fetch(`/api/auth/lookup-invite?token=${encodeURIComponent(inviteToken)}`);
      const data = await res.json();
      if (!res.ok) {
        showError(res.status === 410 ? 'Invite expired' : 'Invalid invite', data.error);
        return;
      }
      inviteEmail = data.email;

      // Populate the form
      document.getElementById('daycareName').textContent    = data.daycare_name || 'Your Daycare';
      document.getElementById('daycareLocation').textContent = data.daycare_location || '';
      document.getElementById('inviteRole').textContent      = data.role === 'admin' ? 'Site Manager' : 'Team Member';
      document.getElementById('emailDisplay').value          = data.email;

      document.getElementById('stateLoading').style.display = 'none';
      document.getElementById('stateForm').style.display    = 'block';
    } catch (err) {
      showError('Connection error', 'Could not validate your invite. Please try again or contact support.');
    }
  }

  function showError(title, body) {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('errorTitle').textContent = title;
    document.getElementById('errorBody').textContent  = body;
    document.getElementById('stateError').style.display = 'block';
  }

  async function handleJoin(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('formMsg');
    msg.style.display = 'none';

    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const password  = document.getElementById('password').value;

    if (!firstName) { showMsg('Please enter your first name.', 'error'); return; }
    if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: inviteToken, first_name: firstName, last_name: lastName, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');

      if (data.session) {
        // Store session and go to dashboard
        localStorage.setItem('tailwag_session', JSON.stringify(data.session));
        window.location.href = '/dashboard.html';
      } else {
        showMsg('Account created! Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = '/login.html'; }, 1500);
      }
    } catch (err) {
      showMsg(err.message, 'error');
      btn.textContent = 'Create Account & Sign In';
      btn.disabled = false;
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('formMsg');
    el.textContent = text;
    el.className = `msg ${type}`;
    el.style.display = 'block';
  }

  loadInvite();
</script>

</body>
</html>
