<?xml version="1.0" encoding="UTF-8"?>
<!--
  TailWag — Standalone Icon Mark
  Use for: app icon, favicon, embroidery, profile photo, badge
  Size: renders cleanly from 16px to 512px
  Variants: swap rect fill to #0F1410 for Kennel Black background version
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="112" height="112" role="img" aria-label="TailWag icon">
  <title>TailWag icon</title>

  <!-- Daycare Green rounded square background -->
  <rect width="56" height="56" fill="#1E6B4A" rx="12"/>

  <!-- Wag Mark in Warm Linen — centered and scaled for square format -->
  <path d="M 11 50 C 5 30, 23 4, 41 4 C 49 4, 51 18, 45 26"
        stroke="#F5F0E8"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <circle cx="45" cy="26" r="3.5" fill="#F5F0E8"/>
</svg>
