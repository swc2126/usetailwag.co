<?xml version="1.0" encoding="UTF-8"?>
<!--
  TailWag — Single Color / Monochrome Logo
  Transparent background — works on any solid background
  Use when: embroidery, 1-color print, fax, legal documents, stamp use
  Default: Kennel Black (#0F1410)
  Swap fill/stroke to #FFFFFF for reversed (white on any dark background)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 56" width="420" height="112" role="img" aria-label="TailWag">
  <title>TailWag</title>
  <defs>
    <style>
      .tw-wm {
        font-family: 'Neue Montreal', 'DM Sans', 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 600;
        font-size: 30px;
        letter-spacing: -0.5px;
      }
    </style>
  </defs>

  <!-- No background — transparent -->

  <!-- Wag Mark — single color -->
  <path d="M 10 50 C 4 30, 22 4, 40 4 C 48 4, 50 18, 44 26"
        stroke="#0F1410"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <circle cx="44" cy="26" r="3.2" fill="#0F1410"/>

  <!-- Wordmark — single color -->
  <text x="64" y="38" class="tw-wm" fill="#0F1410">TailWag</text>
</svg>
