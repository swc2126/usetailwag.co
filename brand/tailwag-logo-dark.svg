<?xml version="1.0" encoding="UTF-8"?>
<!--
  TailWag — Dark Background Logo
  Use on: Kennel Black (#0F1410) or Daycare Green (#1E6B4A) backgrounds
  Colors: Warm Linen (#F5F0E8) icon + wordmark on Kennel Black background
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 56" width="420" height="112" role="img" aria-label="TailWag">
  <title>TailWag</title>
  <defs>
    <style>
      .tw-wm {
        font-family: 'Neue Montreal', 'DM Sans', 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 600;
        font-size: 30px;
        letter-spacing: -0.5px;
      }
    </style>
  </defs>

  <!-- Kennel Black background with slight rounding for card/badge use -->
  <rect width="210" height="56" fill="#0F1410" rx="6"/>

  <!-- Wag Mark in Warm Linen -->
  <path d="M 10 50 C 4 30, 22 4, 40 4 C 48 4, 50 18, 44 26"
        stroke="#F5F0E8"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <circle cx="44" cy="26" r="3.2" fill="#F5F0E8"/>

  <!-- Wordmark in Warm Linen -->
  <text x="64" y="38" class="tw-wm" fill="#F5F0E8">TailWag</text>
</svg>
