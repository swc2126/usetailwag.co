<!-- HEAD: place in <head> of your Brevo template -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap');

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Brand tokens ── */
  :root {
    --tw-black:  #0F1410;
    --tw-green:  #1E6B4A;
    --tw-green-dark: #164D35;
    --tw-linen:  #F5F0E8;
    --tw-gold:   #C4933F;
    --tw-sage:   #A8C5B0;
    --tw-slate:  #2D3748;
    --tw-border: rgba(245,240,232,0.12);
  }

  /* ── Outer wrapper ── */
  .sib-form {
    background: var(--tw-black) !important;
    padding: 48px 24px !important;
    font-family: 'Inter', sans-serif !important;
    text-align: center !important;
  }

  #sib-form-container {
    max-width: 480px !important;
    margin: 0 auto !important;
  }

  /* ── Main card ── */
  #sib-container {
    background: rgba(245,240,232,0.05) !important;
    border: 1px solid var(--tw-border) !important;
    border-radius: 16px !important;
    padding: 36px 32px !important;
    max-width: 480px !important;
    text-align: left !important;
  }

  /* ── Eyebrow / kicker above title ── */
  #sib-container::before {
    content: "🐾  Bi-monthly · Free";
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--tw-gold);
    background: rgba(196,147,63,0.12);
    border: 1px solid rgba(196,147,63,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    display: inline-block;
    margin-bottom: 20px;
  }

  /* ── Title block ── */
  .sib-form-block p,
  .sib-form-block {
    font-family: 'Plus Jakarta Sans', sans-serif !important;
    font-size: 28px !important;
    font-weight: 800 !important;
    color: var(--tw-linen) !important;
    background: transparent !important;
    letter-spacing: -0.5px !important;
    line-height: 1.15 !important;
    text-align: left !important;
    margin-bottom: 4px !important;
  }

  /* ── Subtitle / description block ── */
  .sib-text-form-block p,
  .sib-text-form-block {
    font-family: 'Inter', sans-serif !important;
    font-size: 14px !important;
    font-weight: 400 !important;
    color: rgba(245,240,232,0.6) !important;
    line-height: 1.6 !important;
    letter-spacing: 0 !important;
    margin-bottom: 24px !important;
  }

  /* ── Label ── */
  .entry__label {
    display: block !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.06em !important;
    color: rgba(245,240,232,0.5) !important;
    margin-bottom: 8px !important;
  }

  /* ── Email input ── */
  .entry__field {
    margin-bottom: 8px !important;
  }

  .input {
    width: 100% !important;
    padding: 14px 18px !important;
    border-radius: 10px !important;
    border: 1px solid rgba(245,240,232,0.15) !important;
    background: rgba(255,255,255,0.06) !important;
    color: var(--tw-linen) !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 15px !important;
    outline: none !important;
    transition: border-color 0.2s !important;
    -webkit-appearance: none !important;
  }

  .input:focus {
    border-color: var(--tw-green) !important;
    background: rgba(255,255,255,0.09) !important;
  }

  #sib-container input:-ms-input-placeholder { color: rgba(245,240,232,0.3) !important; font-family: 'Inter', sans-serif !important; }
  #sib-container input::placeholder { color: rgba(245,240,232,0.3) !important; font-family: 'Inter', sans-serif !important; }

  /* ── Helper text ── */
  .entry__specification {
    font-family: 'Inter', sans-serif !important;
    font-size: 11px !important;
    color: rgba(245,240,232,0.3) !important;
    margin-top: 6px !important;
    display: block !important;
  }

  /* ── Submit button ── */
  .sib-form-block__button {
    width: 100% !important;
    padding: 14px 24px !important;
    border-radius: 10px !important;
    border: none !important;
    background: var(--tw-green) !important;
    color: var(--tw-linen) !important;
    font-family: 'Plus Jakarta Sans', sans-serif !important;
    font-size: 15px !important;
    font-weight: 700 !important;
    letter-spacing: 0.01em !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    margin-top: 4px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 8px !important;
  }

  .sib-form-block__button:hover {
    background: var(--tw-green-dark) !important;
  }

  .sib-form-block__button:disabled {
    opacity: 0.6 !important;
    cursor: not-allowed !important;
  }

  /* Hide Brevo's spinner SVG (we keep theirs for loading state) */
  .sib-hide-loader-icon { display: none !important; }

  /* ── Fine print below button ── */
  #sib-container::after {
    content: "No spam. Unsubscribe anytime.";
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(245,240,232,0.25);
    text-align: center;
    margin-top: 14px;
  }

  /* ── Success message ── */
  #success-message {
    background: rgba(30,107,74,0.15) !important;
    border: 1px solid rgba(30,107,74,0.4) !important;
    border-radius: 10px !important;
    color: var(--tw-sage) !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 14px !important;
    max-width: 480px !important;
    margin: 0 auto 16px !important;
    padding: 14px 20px !important;
  }

  #success-message .sib-form-message-panel__inner-text {
    color: var(--tw-sage) !important;
  }

  .sib-notification__icon path { fill: var(--tw-sage) !important; }

  /* ── Error message ── */
  #error-message {
    background: rgba(229,62,62,0.1) !important;
    border: 1px solid rgba(229,62,62,0.35) !important;
    border-radius: 10px !important;
    color: #fc8181 !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 14px !important;
    max-width: 480px !important;
    margin: 0 auto 16px !important;
    padding: 14px 20px !important;
  }

  #error-message .sib-form-message-panel__inner-text {
    color: #fc8181 !important;
  }

  /* ── Inline field error ── */
  .entry__error {
    font-family: 'Inter', sans-serif !important;
    font-size: 12px !important;
    color: #fc8181 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 4px 0 0 !important;
  }

  /* ── Brevo link override ── */
  #sib-container a {
    color: var(--tw-sage) !important;
    text-decoration: underline !important;
  }

  /* ── Logo / brand line at bottom ── */
  .sib-form-block__button-with-loader + div,
  .sib-form__declaration {
    display: none !important;
  }

  @media (max-width: 520px) {
    .sib-form { padding: 32px 16px !important; }
    #sib-container { padding: 28px 20px !important; border-radius: 12px !important; }
  }
</style>
